<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="50%" style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad2)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
  </g>

  <!-- Ambient glow center -->
  <circle cx="400" cy="230" r="160" fill="#a855f7" fill-opacity="0.05" filter="url(#softGlow)"/>

  <!-- Main chat bubble (bot response) -->
  <rect x="220" y="90" width="320" height="90" rx="16" fill="url(#bubbleGrad)" stroke="#a855f7" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- Bubble tail -->
  <path d="M250 180 L240 205 L275 180 Z" fill="#a855f7" fill-opacity="0.2" stroke="#a855f7" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Chat lines inside bot bubble -->
  <rect x="244" y="112" width="200" height="6" rx="3" fill="#a855f7" fill-opacity="0.7"/>
  <rect x="244" y="130" width="260" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.3"/>
  <rect x="244" y="148" width="180" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.3"/>

  <!-- Bot avatar -->
  <circle cx="230" cy="88" r="20" fill="url(#accentGrad2)" fill-opacity="0.9" filter="url(#glow2)"/>
  <!-- Bot face -->
  <rect x="222" y="82" width="6" height="6" rx="1" fill="#ffffff" fill-opacity="0.9"/>
  <rect x="234" y="82" width="6" height="6" rx="1" fill="#ffffff" fill-opacity="0.9"/>
  <rect x="224" y="93" width="14" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.7"/>

  <!-- User chat bubble -->
  <rect x="250" y="220" width="260" height="70" rx="16" fill="#ffffff" fill-opacity="0.07" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1.5"/>
  <!-- User bubble tail (right side) -->
  <path d="M490 290 L505 310 L478 290 Z" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Chat lines in user bubble -->
  <rect x="270" y="240" width="180" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.3"/>
  <rect x="270" y="258" width="140" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.25"/>
  <rect x="270" y="275" width="100" height="4" rx="2" fill="#ffffff" fill-opacity="0.2"/>

  <!-- Second bot bubble (smaller) -->
  <rect x="180" y="315" width="280" height="60" rx="14" fill="url(#bubbleGrad)" stroke="#a855f7" stroke-opacity="0.35" stroke-width="1"/>
  <rect x="202" y="333" width="200" height="5" rx="2.5" fill="#a855f7" fill-opacity="0.6"/>
  <rect x="202" y="350" width="155" height="4" rx="2" fill="#ffffff" fill-opacity="0.22"/>

  <!-- Strategy node network (top right) -->
  <circle cx="640" cy="130" r="22" fill="#a855f7" fill-opacity="0.12" stroke="#a855f7" stroke-opacity="0.5" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="640" y="136" text-anchor="middle" font-size="14" fill="#a855f7" font-family="serif" filter="url(#glow2)">⬡</text>

  <circle cx="700" cy="200" r="16" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="700" y="206" text-anchor="middle" font-size="11" fill="#6366f1" font-family="serif">⬡</text>

  <circle cx="620" cy="240" r="12" fill="#a855f7" fill-opacity="0.1" stroke="#a855f7" stroke-opacity="0.35" stroke-width="1"/>
  <text x="620" y="245" text-anchor="middle" font-size="9" fill="#a855f7" font-family="serif">⬡</text>

  <!-- Network connecting lines -->
  <line x1="640" y1="152" x2="700" y2="184" stroke="#a855f7" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="640" y1="152" x2="620" y2="228" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="700" y1="200" x2="620" y2="240" stroke="#a855f7" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- Left decorative nodes -->
  <circle cx="120" cy="200" r="16" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="100" cy="280" r="10" fill="#a855f7" fill-opacity="0.1" stroke="#a855f7" stroke-opacity="0.25" stroke-width="1"/>
  <line x1="120" y1="216" x2="100" y2="270" stroke="#6366f1" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="136" y1="200" x2="220" y2="135" stroke="#6366f1" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="3 5"/>

  <!-- Typing indicator dots -->
  <circle cx="346" cy="390" r="5" fill="#a855f7" fill-opacity="0.7" filter="url(#glow2)"/>
  <circle cx="362" cy="390" r="5" fill="#a855f7" fill-opacity="0.5"/>
  <circle cx="378" cy="390" r="5" fill="#a855f7" fill-opacity="0.3"/>

  <!-- Label badge -->
  <rect x="326" y="96" width="92" height="20" rx="4" fill="url(#accentGrad2)" fill-opacity="0.85"/>
  <text x="372" y="110" text-anchor="middle" font-size="9" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#ffffff" letter-spacing="1">AI CHATBOT</text>

  <!-- Title text -->
  <text x="400" y="432" text-anchor="middle" font-size="28" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#ffffff" fill-opacity="0.95" letter-spacing="1">Strategic Advisor</text>
  <text x="400" y="458" text-anchor="middle" font-size="12" font-family="'Segoe UI', Arial, sans-serif" fill="#a855f7" fill-opacity="0.9" letter-spacing="2">AI-POWERED STRATEGY CHATBOT</text>
</svg>
