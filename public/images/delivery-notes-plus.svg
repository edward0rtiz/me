<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="50%" style="stop-color:#203a43"/>
      <stop offset="100%" style="stop-color:#2c5364"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
  </g>

  <!-- Main document card -->
  <rect x="260" y="80" width="220" height="280" rx="10" fill="url(#docGrad)" stroke="#00d2ff" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- Document fold corner -->
  <path d="M440 80 L460 100 L440 100 Z" fill="#00d2ff" fill-opacity="0.3"/>
  <path d="M440 80 L460 100 L440 80 Z" stroke="#00d2ff" stroke-opacity="0.5" stroke-width="1"/>

  <!-- Document lines (content) -->
  <rect x="284" y="120" width="140" height="6" rx="3" fill="#00d2ff" fill-opacity="0.6"/>
  <rect x="284" y="140" width="110" height="4" rx="2" fill="#ffffff" fill-opacity="0.25"/>
  <rect x="284" y="158" width="130" height="4" rx="2" fill="#ffffff" fill-opacity="0.25"/>
  <rect x="284" y="176" width="90" height="4" rx="2" fill="#ffffff" fill-opacity="0.25"/>

  <!-- Divider -->
  <line x1="284" y1="198" x2="424" y2="198" stroke="#00d2ff" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Second block -->
  <rect x="284" y="212" width="120" height="4" rx="2" fill="#ffffff" fill-opacity="0.2"/>
  <rect x="284" y="228" width="140" height="4" rx="2" fill="#ffffff" fill-opacity="0.2"/>
  <rect x="284" y="244" width="100" height="4" rx="2" fill="#ffffff" fill-opacity="0.2"/>
  <rect x="284" y="260" width="130" height="4" rx="2" fill="#ffffff" fill-opacity="0.2"/>

  <!-- AI sparkle / agent indicator at bottom of doc -->
  <circle cx="370" cy="320" r="18" fill="#00d2ff" fill-opacity="0.15" stroke="#00d2ff" stroke-opacity="0.7" stroke-width="1.5" filter="url(#glow)"/>
  <text x="370" y="326" text-anchor="middle" font-size="16" fill="#00d2ff" font-family="monospace" filter="url(#glow)">✦</text>

  <!-- Agent orbit rings -->
  <ellipse cx="370" cy="320" rx="34" ry="34" fill="none" stroke="#00d2ff" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4 4"/>
  <ellipse cx="370" cy="320" rx="52" ry="52" fill="none" stroke="#3a7bd5" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="6 6"/>

  <!-- Orbiting dots -->
  <circle cx="404" cy="320" r="3" fill="#00d2ff" fill-opacity="0.8" filter="url(#glow)"/>
  <circle cx="370" cy="286" r="3" fill="#3a7bd5" fill-opacity="0.8" filter="url(#glow)"/>
  <circle cx="336" cy="320" r="2" fill="#00d2ff" fill-opacity="0.6"/>

  <!-- Secondary floating doc -->
  <rect x="490" y="140" width="140" height="180" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#3a7bd5" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="508" y="168" width="90" height="4" rx="2" fill="#3a7bd5" fill-opacity="0.5"/>
  <rect x="508" y="184" width="70" height="4" rx="2" fill="#ffffff" fill-opacity="0.18"/>
  <rect x="508" y="200" width="85" height="4" rx="2" fill="#ffffff" fill-opacity="0.18"/>
  <rect x="508" y="216" width="60" height="4" rx="2" fill="#ffffff" fill-opacity="0.18"/>
  <rect x="508" y="240" width="80" height="4" rx="2" fill="#ffffff" fill-opacity="0.15"/>
  <rect x="508" y="256" width="65" height="4" rx="2" fill="#ffffff" fill-opacity="0.15"/>

  <!-- Third floating doc (left) -->
  <rect x="170" y="160" width="120" height="150" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#3a7bd5" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="186" y="186" width="80" height="4" rx="2" fill="#3a7bd5" fill-opacity="0.4"/>
  <rect x="186" y="202" width="65" height="4" rx="2" fill="#ffffff" fill-opacity="0.15"/>
  <rect x="186" y="218" width="75" height="4" rx="2" fill="#ffffff" fill-opacity="0.15"/>
  <rect x="186" y="234" width="55" height="4" rx="2" fill="#ffffff" fill-opacity="0.15"/>
  <rect x="186" y="258" width="70" height="4" rx="2" fill="#ffffff" fill-opacity="0.12"/>

  <!-- Connecting lines (agent network) -->
  <line x1="290" y1="250" x2="230" y2="270" stroke="#00d2ff" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="460" y1="250" x2="490" y2="250" stroke="#3a7bd5" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- Top label badge -->
  <rect x="296" y="88" width="86" height="20" rx="4" fill="url(#accentGrad)" fill-opacity="0.85"/>
  <text x="339" y="102" text-anchor="middle" font-size="9" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#ffffff" letter-spacing="1">AI AGENT</text>

  <!-- Title text -->
  <text x="400" y="432" text-anchor="middle" font-size="28" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#ffffff" fill-opacity="0.95" letter-spacing="1">DeliveryNotes+</text>
  <text x="400" y="458" text-anchor="middle" font-size="12" font-family="'Segoe UI', Arial, sans-serif" fill="#00d2ff" fill-opacity="0.85" letter-spacing="2">INTELLIGENT DOCUMENT AGENT</text>
</svg>
